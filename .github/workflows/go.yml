name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Debug username
      run: |
        echo "length=${#OP_USER}"
        echo "first_char=${OP_USER:0:1}"
        echo "last_char=${OP_USER: -1}"
      env:
        OP_USER: ${{ secrets.OPERATOR_USER }}
    - name: Who am I
      run: |
        curl -s -u "${{ secrets.OPERATOR_USER }}:${{ secrets.OPERATOR_PAT }}" \
          https://api.github.com/user
    - name: Set up Go 1.26.2
      uses: actions/setup-go@v2
      with:
        go-version: 1.26.2

    - name: Check out code into the Go module directory
      uses: actions/checkout@v2

    - name: Get dependencies
      run: |
        go get -v -t -d ./...
        make envtest

    - name: Build
      run: go build -v ./...

    - name: Test
      run:  make test
      
    - name: Lint
      run: make lint
      
    - name: Send coverage
      uses: shogo82148/actions-goveralls@v1
      with:
        path-to-profile: profile.cov
